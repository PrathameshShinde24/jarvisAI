<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0a0a0f;
      --panel:     #12121a;
      --text:      #e8e8ed;
      --muted:     #6b7280;
      --accent:    #4a9eff;
      --secondary: #a78bfa;
      --border:    rgba(255,255,255,0.06);
      --success:   #34d399;
      --error:     #f87171;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
    .layout { display: grid; grid-template-columns: 1fr 380px; height: 100vh; }

    /* Orb area */
    .orb-area { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; padding: 40px; position: relative; }
    .wordmark { font-size: 13px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text); }
    .orb-wrapper { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
    .orb-ring { position: absolute; inset: -20px; border-radius: 50%; border: 1px solid rgba(74,158,255,0.12); transition: border-color 0.4s ease; }
    .orb {
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(74,158,255,0.3) 0%, rgba(74,158,255,0.1) 45%, rgba(10,10,20,0.9) 100%);
      border: 1px solid rgba(74,158,255,0.2);
      box-shadow: 0 0 40px rgba(74,158,255,0.08), inset 0 0 40px rgba(74,158,255,0.04);
      transition: all 0.4s ease; position: relative;
    }
    .orb::after { content: ''; position: absolute; top: 22px; left: 28px; width: 28px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.15); filter: blur(4px); }

    /* LISTENING */
    .orb-wrapper.listening .orb { animation: pulse-listen 2s ease-in-out infinite; border-color: rgba(74,158,255,0.55); box-shadow: 0 0 60px rgba(74,158,255,0.25), 0 0 120px rgba(74,158,255,0.08), inset 0 0 40px rgba(74,158,255,0.08); }
    .orb-wrapper.listening .orb-ring { border-color: rgba(74,158,255,0.25); animation: ring-spin 4s linear infinite; }
    @keyframes pulse-listen { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* THINKING */
    .orb-wrapper.thinking .orb { animation: pulse-think 0.8s ease-in-out infinite; background: radial-gradient(circle at 35% 35%, rgba(167,139,250,0.3) 0%, rgba(167,139,250,0.1) 45%, rgba(10,10,20,0.9) 100%); border-color: rgba(167,139,250,0.55); box-shadow: 0 0 60px rgba(167,139,250,0.25), inset 0 0 40px rgba(167,139,250,0.08); }
    @keyframes pulse-think { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.04); opacity: 0.8; } }

    /* SPEAKING */
    .orb-wrapper.speaking .orb { animation: pulse-speak 1.2s ease-in-out infinite; background: radial-gradient(circle at 35% 35%, rgba(52,211,153,0.25) 0%, rgba(52,211,153,0.08) 45%, rgba(10,10,20,0.9) 100%); border-color: rgba(52,211,153,0.55); box-shadow: 0 0 60px rgba(52,211,153,0.2), inset 0 0 40px rgba(52,211,153,0.06); }
    @keyframes pulse-speak { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    .status-label { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); transition: color 0.3s ease; }
    .status-label.listening { color: var(--accent); }
    .status-label.thinking  { color: var(--secondary); }
    .status-label.speaking  { color: var(--success); }

    .hint { position: absolute; bottom: 32px; font-size: 12px; color: var(--muted); }
    .hint kbd { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; color: var(--text); }

    /* Transcript panel */
    .transcript-panel { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
    .panel-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .panel-title { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .conn-dot.connected    { background: var(--success); }
    .conn-dot.disconnected { background: var(--error); }
    .clear-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-size: 11px; padding: 4px 10px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .clear-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    .transcript-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.06) transparent; }
    .transcript-scroll::-webkit-scrollbar { width: 4px; }
    .transcript-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .message { display: flex; flex-direction: column; gap: 4px; animation: msg-in 0.2s ease; }
    @keyframes msg-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .message-role { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 0 12px; }
    .message.user   .message-role { color: var(--accent); }
    .message.jarvis .message-role { color: var(--secondary); }
    .message-text { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.6; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); color: var(--text); word-break: break-word; }
    .message.user   .message-text { background: rgba(74,158,255,0.05);  border-color: rgba(74,158,255,0.12); }
    .message.jarvis .message-text { background: rgba(167,139,250,0.05); border-color: rgba(167,139,250,0.1); }

    /* Input bar */
    .input-bar { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
    .text-input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 13px; padding: 10px 14px; outline: none; transition: border-color 0.2s; }
    .text-input::placeholder { color: var(--muted); }
    .text-input:focus { border-color: rgba(74,158,255,0.4); }
    .send-btn { background: rgba(74,158,255,0.12); border: 1px solid rgba(74,158,255,0.22); border-radius: 8px; color: var(--accent); font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500; padding: 10px 16px; cursor: pointer; transition: background 0.2s, border-color 0.2s; }
    .send-btn:hover    { background: rgba(74,158,255,0.22); border-color: rgba(74,158,255,0.4); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="layout">
  <!-- Left: Orb -->
  <div class="orb-area">
    <div class="wordmark">JARVIS</div>
    <div class="orb-wrapper" id="orbWrapper">
      <div class="orb-ring"></div>
      <div class="orb"></div>
    </div>
    <div class="status-label" id="statusLabel">IDLE</div>
    <p class="hint">Press <kbd>Ctrl</kbd> + <kbd>Space</kbd> to activate</p>
  </div>
  <!-- Right: Transcript -->
  <div class="transcript-panel">
    <div class="panel-header">
      <span class="panel-title">Transcript</span>
      <div class="header-right">
        <div class="conn-dot" id="connDot"></div>
        <button class="clear-btn" onclick="clearTranscript()">Clear</button>
      </div>
    </div>
    <div class="transcript-scroll" id="transcriptScroll"></div>
    <div class="input-bar">
      <input class="text-input" id="textInput" type="text" placeholder="Type a command..." autocomplete="off" />
      <button class="send-btn" id="sendBtn" onclick="sendText()">Send</button>
    </div>
  </div>
</div>
<script>
  const orbWrapper  = document.getElementById('orbWrapper');
  const statusLabel = document.getElementById('statusLabel');
  const connDot     = document.getElementById('connDot');
  const scroll      = document.getElementById('transcriptScroll');
  const textInput   = document.getElementById('textInput');
  const sendBtn     = document.getElementById('sendBtn');

  let ws = null;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen  = () => { connDot.className = 'conn-dot connected'; };
    ws.onclose = () => { connDot.className = 'conn-dot disconnected'; setTimeout(connect, 2000); };
    ws.onerror = () => { connDot.className = 'conn-dot disconnected'; };
    ws.onmessage = (evt) => {
      try {
        const data = JSON.parse(evt.data);
        if (data.type === 'state')      handleState(data.state);
        if (data.type === 'transcript') addMessage(data.role, data.text);
      } catch(_) {}
    };
  }

  function handleState(state) {
    const s = state.toLowerCase();
    orbWrapper.className  = 'orb-wrapper ' + (s === 'idle' ? '' : s);
    statusLabel.className = 'status-label ' + (s === 'idle' ? '' : s);
    statusLabel.textContent = state;
  }

  function addMessage(role, text) {
    const msg = document.createElement('div');
    msg.className = 'message ' + role;
    msg.innerHTML = '<span class="message-role">' + (role === 'user' ? 'You' : 'Jarvis') + '</span><div class="message-text">' + escHtml(text) + '</div>';
    scroll.appendChild(msg);
    scroll.scrollTop = scroll.scrollHeight;
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function clearTranscript() { scroll.innerHTML = ''; }

  async function sendText() {
    const text = textInput.value.trim();
    if (!text) return;
    textInput.value = '';
    sendBtn.disabled = true;
    addMessage('user', text);
    try {
      const res  = await fetch('/command', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text}) });
      const data = await res.json();
      if (data.response) addMessage('jarvis', data.response);
    } catch(e) {
      addMessage('jarvis', 'Error: could not reach Jarvis.');
    } finally {
      sendBtn.disabled = false;
      textInput.focus();
    }
  }

  textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendText(); });
  connect();
</script>
</body>
</html>
